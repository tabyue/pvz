<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>植物大战僵尸</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1a2e;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;touch-action:none}
#game-container{width:100%;height:100%;display:flex;flex-direction:column;padding:env(safe-area-inset-top,4px) 4px env(safe-area-inset-bottom,4px) 4px}

/* 顶部栏 */
#top-bar{display:flex;justify-content:space-between;align-items:center;padding:4px 8px;flex-shrink:0;color:#ccd6f6;font-size:13px}
#sun-count{display:flex;align-items:center;gap:4px;font-size:16px;font-weight:700;color:#fbbf24}
#wave-info{font-size:12px;color:#8892b0}
#score-display{font-size:14px;font-weight:600;color:#64ffda}

/* 植物选择栏 */
#plant-bar{display:flex;gap:6px;padding:4px 8px;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.plant-card{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:56px;height:56px;border-radius:10px;background:rgba(255,255,255,0.07);border:2px solid transparent;font-size:11px;color:#8892b0;cursor:pointer;transition:all 0.15s;position:relative}
.plant-card .emoji{font-size:24px;line-height:1}
.plant-card .cost{font-size:10px;color:#fbbf24;margin-top:1px}
.plant-card.selected{border-color:#64ffda;background:rgba(100,255,218,0.1)}
.plant-card.disabled{opacity:0.35;pointer-events:none}
.plant-card .cooldown-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);border-radius:8px;display:none}
.plant-card.on-cooldown .cooldown-overlay{display:block}

/* 铲子按钮 */
.plant-card.shovel{border-color:rgba(255,100,100,0.3)}
.plant-card.shovel.selected{border-color:#f87171;background:rgba(248,113,113,0.15)}

/* 游戏区域 */
#game-area{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;position:relative}
#canvas{display:block;border-radius:4px}

/* 覆盖层 */
#overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(26,26,46,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;border-radius:4px}
#overlay.hidden{display:none}
#overlay h1{color:#ccd6f6;font-size:24px;margin-bottom:6px}
#overlay .sub{color:#8892b0;font-size:13px;margin-bottom:20px;text-align:center;line-height:1.6}
#overlay .final-score{color:#64ffda;font-size:36px;font-weight:700;margin-bottom:16px}
.overlay-btn{padding:12px 40px;border:none;border-radius:10px;background:linear-gradient(135deg,#10b981,#06b6d4);color:#fff;font-size:16px;font-weight:600;cursor:pointer}
.overlay-btn:active{opacity:0.8}
</style>
</head>
<body>
<div id="game-container">
  <div id="top-bar">
    <div id="sun-count">☀️ <span id="sun-val">50</span></div>
    <div id="wave-info">波次 <span id="wave-val">1</span></div>
    <div id="score-display">得分: <span id="score-val">0</span></div>
  </div>
  <div id="plant-bar">
    <div class="plant-card" data-type="sunflower" data-cost="50"><div class="emoji">🌻</div><div class="cost">50</div><div class="cooldown-overlay"></div></div>
    <div class="plant-card" data-type="peashooter" data-cost="100"><div class="emoji">🫛</div><div class="cost">100</div><div class="cooldown-overlay"></div></div>
    <div class="plant-card" data-type="wallnut" data-cost="50"><div class="emoji">🥜</div><div class="cost">50</div><div class="cooldown-overlay"></div></div>
    <div class="plant-card" data-type="snowpea" data-cost="175"><div class="emoji">❄️</div><div class="cost">175</div><div class="cooldown-overlay"></div></div>
    <div class="plant-card" data-type="repeater" data-cost="200"><div class="emoji">🌿</div><div class="cost">200</div><div class="cooldown-overlay"></div></div>
    <div class="plant-card" data-type="cherrybomb" data-cost="150"><div class="emoji">🍒</div><div class="cost">150</div><div class="cooldown-overlay"></div></div>
    <div class="plant-card shovel" data-type="shovel" data-cost="0"><div class="emoji">🪓</div><div class="cost">铲</div></div>
  </div>
  <div id="game-area">
    <canvas id="canvas"></canvas>
    <div id="overlay">
      <h1>🌻 植物大战僵尸 🧟</h1>
      <div class="sub">种植物，守家园！<br>点击植物卡 → 点击草地放置<br>消灭所有僵尸即可过关</div>
      <button class="overlay-btn" id="start-btn">开始游戏</button>
    </div>
  </div>
</div>

<script>
// ==================== 配置 ====================
const ROWS = 5, COLS = 9;
const LAWN_COLOR_A = '#3a7d44', LAWN_COLOR_B = '#4a9a54';
const ZOMBIE_SPAWN_COL = COLS; // 从右侧屏幕外生成

// 植物定义
const PLANT_DEF = {
  sunflower:  { hp: 60, emoji: '🌻', cooldown: 5000, sunProd: true, shootInterval: 0 },
  peashooter: { hp: 60, emoji: '🫛', cooldown: 3000, sunProd: false, shootInterval: 1500, bulletSpeed: 3, bulletDmg: 20, bulletColor: '#22c55e', bulletEmoji: '•', slow: false },
  wallnut:    { hp: 400, emoji: '🥜', cooldown: 12000, sunProd: false, shootInterval: 0 },
  snowpea:    { hp: 60, emoji: '❄️', cooldown: 3000, sunProd: false, shootInterval: 1500, bulletSpeed: 3, bulletDmg: 20, bulletColor: '#67e8f9', bulletEmoji: '•', slow: true },
  repeater:   { hp: 60, emoji: '🌿', cooldown: 3000, sunProd: false, shootInterval: 1500, bulletSpeed: 3, bulletDmg: 20, bulletColor: '#22c55e', bulletEmoji: '•', slow: false, double: true },
  cherrybomb: { hp: 1, emoji: '🍒', cooldown: 25000, sunProd: false, shootInterval: 0, bomb: true },
};

// 僵尸定义
const ZOMBIE_DEF = {
  normal:     { hp: 100, speed: 0.3, dmg: 10, emoji: '🧟', points: 10 },
  cone:       { hp: 200, speed: 0.3, dmg: 10, emoji: '🧟‍♂️', points: 20 },
  bucket:     { hp: 400, speed: 0.25, dmg: 15, emoji: '🪖', points: 40 },
  runner:     { hp: 80,  speed: 0.7, dmg: 8,  emoji: '💀', points: 15 },
};

// 波次
const WAVES = [
  { zombies: [{type:'normal',count:3,interval:4000}], spawnDelay: 8000 },
  { zombies: [{type:'normal',count:4,interval:3500},{type:'cone',count:1,interval:5000}], spawnDelay: 3000 },
  { zombies: [{type:'normal',count:3,interval:3000},{type:'cone',count:2,interval:4000},{type:'runner',count:2,interval:3500}], spawnDelay: 2000 },
  { zombies: [{type:'normal',count:4,interval:2500},{type:'cone',count:3,interval:3500},{type:'runner',count:3,interval:3000}], spawnDelay: 1500 },
  { zombies: [{type:'normal',count:5,interval:2500},{type:'cone',count:3,interval:3000},{type:'bucket',count:1,interval:6000},{type:'runner',count:3,interval:2800}], spawnDelay: 1000 },
  { zombies: [{type:'normal',count:6,interval:2200},{type:'cone',count:4,interval:2800},{type:'bucket',count:2,interval:5000},{type:'runner',count:4,interval:2500}], spawnDelay: 500 },
  { zombies: [{type:'normal',count:8,interval:2000},{type:'cone',count:5,interval:2500},{type:'bucket',count:3,interval:4000},{type:'runner',count:5,interval:2200}], spawnDelay: 300 },
];

// ==================== 状态 ====================
let cellW, cellH, canvasW, canvasH;
let playing = false, gameOver = false;
let sun = 50, score = 0, wave = 0;
let selectedPlant = null;
let plants = [], bullets = [], zombies = [], suns = [], particles = [];
let cooldowns = {}; // { plantType: readyTime }
let waveState = null;
let lastTime = 0, sunTimer = 0, naturalSunTimer = 0;
let dpr = 1;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// ==================== 尺寸 ====================
function resize() {
  const area = document.getElementById('game-area');
  const aW = area.clientWidth - 4;
  const aH = area.clientHeight - 4;
  cellW = Math.min(Math.floor(aW / COLS), 52);
  cellH = Math.min(Math.floor(aH / ROWS), 52);
  cellW = cellH = Math.min(cellW, cellH);
  canvasW = cellW * COLS;
  canvasH = cellH * ROWS;
  dpr = window.devicePixelRatio || 1;
  canvas.style.width = canvasW + 'px';
  canvas.style.height = canvasH + 'px';
  canvas.width = canvasW * dpr;
  canvas.height = canvasH * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);

// ==================== 绘制 ====================
function drawLawn() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      ctx.fillStyle = (r + c) % 2 === 0 ? LAWN_COLOR_A : LAWN_COLOR_B;
      ctx.fillRect(c * cellW, r * cellH, cellW, cellH);
    }
  }
  // 右侧红线（僵尸侧）
  ctx.fillStyle = 'rgba(255,80,80,0.15)';
  ctx.fillRect((COLS - 0.3) * cellW, 0, cellW * 0.3, canvasH);
}

function drawEmoji(emoji, cx, cy, size, shadow) {
  ctx.save();
  ctx.font = size + 'px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji","Twemoji Mozilla",sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.globalAlpha = 1;
  if (shadow) {
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 4;
    ctx.shadowOffsetX = 1;
    ctx.shadowOffsetY = 2;
  }
  // 双重绘制让 emoji 更实、更不透明
  ctx.fillText(emoji, cx, cy);
  ctx.shadowColor = 'transparent';
  ctx.fillText(emoji, cx, cy);
  ctx.restore();
}

function drawPlants() {
  for (const p of plants) {
    const cx = (p.col + 0.5) * cellW;
    const cy = (p.row + 0.5) * cellH;
    const def = PLANT_DEF[p.type];
    // 格子底色高亮，让植物位置更明显
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.beginPath();
    ctx.roundRect(p.col * cellW + 2, p.row * cellH + 2, cellW - 4, cellH - 4, 4);
    ctx.fill();
    // 受伤抖动
    const shake = p.hurtTimer > 0 ? (Math.random() - 0.5) * 3 : 0;
    drawEmoji(def.emoji, cx + shake, cy + shake, cellW * 0.65, true);
    // 血条
    if (p.hp < def.hp) {
      const bw = cellW * 0.6;
      const bx = cx - bw / 2;
      const by = (p.row + 0.05) * cellH;
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(bx, by, bw, 3);
      ctx.fillStyle = p.hp / def.hp > 0.3 ? '#22c55e' : '#ef4444';
      ctx.fillRect(bx, by, bw * (p.hp / def.hp), 3);
    }
  }
}

function drawBullets() {
  for (const b of bullets) {
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.arc(b.x, b.y, 5, 0, Math.PI * 2);
    ctx.fill();
    // 光晕
    ctx.fillStyle = b.slow ? 'rgba(103,232,249,0.35)' : 'rgba(34,197,94,0.25)';
    ctx.beginPath();
    ctx.arc(b.x, b.y, 8, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawZombies() {
  for (const z of zombies) {
    const cx = z.x;
    const cy = (z.row + 0.5) * cellH;
    const def = ZOMBIE_DEF[z.type];
    // 僵尸底部光晕，增强可见度
    ctx.fillStyle = 'rgba(180,30,30,0.18)';
    ctx.beginPath();
    ctx.arc(cx, cy, cellW * 0.38, 0, Math.PI * 2);
    ctx.fill();
    // 减速效果
    if (z.slowTimer > 0) {
      ctx.fillStyle = 'rgba(103,232,249,0.25)';
      ctx.beginPath();
      ctx.arc(cx, cy, cellW * 0.38, 0, Math.PI * 2);
      ctx.fill();
    }
    const shake = z.hurtTimer > 0 ? (Math.random() - 0.5) * 2 : 0;
    drawEmoji(def.emoji, cx + shake, cy, cellW * 0.65, true);
    // 血条
    const bw = cellW * 0.5;
    const bx = cx - bw / 2;
    const by = (z.row + 0.05) * cellH;
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(bx, by, bw, 3);
    ctx.fillStyle = z.hp / def.hp > 0.3 ? '#ef4444' : '#991b1b';
    ctx.fillRect(bx, by, bw * Math.max(0, z.hp / def.hp), 3);
  }
}

function drawSuns() {
  for (const s of suns) {
    ctx.save();
    if (s.life < 2000) {
      ctx.globalAlpha = Math.max(0.2, s.life / 2000);
    } else {
      ctx.globalAlpha = 1;
    }
    drawEmoji('☀️', s.x, s.y, 26, true);
    ctx.restore();
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawSelection() {
  if (!selectedPlant || selectedPlant === 'shovel') return;
  // 高亮可放置的格子
  ctx.fillStyle = 'rgba(100,255,218,0.08)';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (!getPlantAt(r, c)) {
        ctx.fillRect(c * cellW + 1, r * cellH + 1, cellW - 2, cellH - 2);
      }
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, canvasW, canvasH);
  drawLawn();
  drawSelection();
  drawPlants();
  drawBullets();
  drawZombies();
  drawSuns();
  drawParticles();
}

// ==================== 游戏逻辑 ====================
function getPlantAt(row, col) {
  return plants.find(p => p.row === row && p.col === col);
}

function placePlant(row, col) {
  if (!selectedPlant || selectedPlant === 'shovel') return;
  const def = PLANT_DEF[selectedPlant];
  const cost = parseInt(document.querySelector(`[data-type="${selectedPlant}"]`).dataset.cost);
  if (sun < cost) return;
  if (getPlantAt(row, col)) return;

  sun -= cost;
  cooldowns[selectedPlant] = Date.now() + def.cooldown;
  plants.push({
    type: selectedPlant,
    row, col,
    hp: def.hp,
    shootTimer: def.shootInterval || 0,
    sunProdTimer: def.sunProd ? 8000 : 0,
    hurtTimer: 0,
    bombTimer: def.bomb ? 500 : 0,
  });

  // 樱桃炸弹即刻标记
  if (def.bomb) {
    // 延迟爆炸
  }

  updateSunDisplay();
  updatePlantCards();
}

function removePlant(row, col) {
  const idx = plants.findIndex(p => p.row === row && p.col === col);
  if (idx >= 0) {
    addParticles(plants[idx].col * cellW + cellW / 2, plants[idx].row * cellH + cellH / 2, '#8b5cf6', 6);
    plants.splice(idx, 1);
  }
}

function addParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4,
      size: 2 + Math.random() * 3,
      color,
      life: 500 + Math.random() * 300,
      maxLife: 800,
    });
  }
}

function spawnSun(x, y, fromPlant) {
  suns.push({
    x, y,
    targetY: fromPlant ? y : y + 40 + Math.random() * 60,
    vy: fromPlant ? 0 : 0.5,
    life: 8000,
    value: 25,
    fromPlant,
    settled: fromPlant,
  });
}

function collectSun(s) {
  sun += s.value;
  updateSunDisplay();
  s.life = 0;
  addParticles(s.x, s.y, '#fbbf24', 4);
}

// ==================== 僵尸生成 ====================
function initWave(waveIdx) {
  if (waveIdx >= WAVES.length) {
    // 无限模式：重复最后一波但加强
    const base = WAVES[WAVES.length - 1];
    waveState = {
      queue: [],
      active: true,
    };
    for (const g of base.zombies) {
      const extra = waveIdx - WAVES.length + 1;
      for (let i = 0; i < g.count + extra; i++) {
        waveState.queue.push({
          type: g.type,
          spawnAt: Date.now() + base.spawnDelay + i * Math.max(1000, g.interval - extra * 200),
        });
      }
    }
    return;
  }

  const w = WAVES[waveIdx];
  waveState = { queue: [], active: true };
  for (const g of w.zombies) {
    for (let i = 0; i < g.count; i++) {
      waveState.queue.push({
        type: g.type,
        spawnAt: Date.now() + w.spawnDelay + i * g.interval,
      });
    }
  }
}

function spawnZombie(type) {
  const row = Math.floor(Math.random() * ROWS);
  const def = ZOMBIE_DEF[type];
  zombies.push({
    type,
    row,
    x: canvasW + cellW * 0.5,
    hp: def.hp,
    speed: def.speed,
    eating: false,
    eatTimer: 0,
    hurtTimer: 0,
    slowTimer: 0,
  });
}

// ==================== 更新 ====================
function update(dt) {
  if (!playing || gameOver) return;

  // 波次生成
  if (waveState && waveState.active) {
    const now = Date.now();
    const toSpawn = waveState.queue.filter(q => q.spawnAt <= now);
    for (const q of toSpawn) {
      spawnZombie(q.type);
      waveState.queue.splice(waveState.queue.indexOf(q), 1);
    }
    if (waveState.queue.length === 0 && zombies.length === 0) {
      // 波次结束
      wave++;
      document.getElementById('wave-val').textContent = wave + 1;
      setTimeout(() => initWave(wave), 3000);
      waveState.active = false;
    }
  }

  // 自然产阳光
  naturalSunTimer += dt;
  if (naturalSunTimer > 7000) {
    naturalSunTimer = 0;
    const sx = cellW + Math.random() * (canvasW - cellW * 2);
    spawnSun(sx, -10, false);
  }

  // 更新植物
  for (let i = plants.length - 1; i >= 0; i--) {
    const p = plants[i];
    const def = PLANT_DEF[p.type];
    p.hurtTimer = Math.max(0, p.hurtTimer - dt);

    // 樱桃炸弹
    if (def.bomb && p.bombTimer > 0) {
      p.bombTimer -= dt;
      if (p.bombTimer <= 0) {
        // 爆炸：3x3 范围
        for (let zi = zombies.length - 1; zi >= 0; zi--) {
          const z = zombies[zi];
          const zCol = Math.floor(z.x / cellW);
          if (Math.abs(z.row - p.row) <= 1 && Math.abs(zCol - p.col) <= 1) {
            z.hp -= 1800;
            z.hurtTimer = 200;
          }
        }
        addParticles((p.col + 0.5) * cellW, (p.row + 0.5) * cellH, '#ef4444', 20);
        addParticles((p.col + 0.5) * cellW, (p.row + 0.5) * cellH, '#f97316', 15);
        plants.splice(i, 1);
        continue;
      }
    }

    // 阳光生产
    if (def.sunProd) {
      p.sunProdTimer -= dt;
      if (p.sunProdTimer <= 0) {
        p.sunProdTimer = 12000;
        spawnSun((p.col + 0.5) * cellW + (Math.random() - 0.5) * cellW * 0.5,
                 (p.row + 0.3) * cellH, true);
      }
    }

    // 射击
    if (def.shootInterval > 0) {
      // 检查此行是否有僵尸
      const hasZombie = zombies.some(z => z.row === p.row && z.x > p.col * cellW);
      if (hasZombie) {
        p.shootTimer -= dt;
        if (p.shootTimer <= 0) {
          p.shootTimer = def.shootInterval;
          const bx = (p.col + 0.8) * cellW;
          const by = (p.row + 0.5) * cellH;
          bullets.push({ x: bx, y: by, row: p.row, speed: def.bulletSpeed, dmg: def.bulletDmg, color: def.bulletColor, slow: def.slow || false });
          if (def.double) {
            // 双发：稍微延迟第二发
            setTimeout(() => {
              if (playing && !gameOver) {
                bullets.push({ x: bx, y: by, row: p.row, speed: def.bulletSpeed, dmg: def.bulletDmg, color: def.bulletColor, slow: def.slow || false });
              }
            }, 150);
          }
        }
      }
    }

    // 死亡
    if (p.hp <= 0) {
      addParticles((p.col + 0.5) * cellW, (p.row + 0.5) * cellH, '#666', 5);
      plants.splice(i, 1);
    }
  }

  // 更新子弹
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.speed;
    if (b.x > canvasW + 20) {
      bullets.splice(i, 1);
      continue;
    }
    // 碰撞检测
    for (const z of zombies) {
      if (z.row === b.row && Math.abs(z.x - b.x) < cellW * 0.35) {
        z.hp -= b.dmg;
        z.hurtTimer = 100;
        if (b.slow) z.slowTimer = 3000;
        addParticles(b.x, b.y, b.color, 2);
        bullets.splice(i, 1);
        break;
      }
    }
  }

  // 更新僵尸
  for (let i = zombies.length - 1; i >= 0; i--) {
    const z = zombies[i];
    const def = ZOMBIE_DEF[z.type];
    z.hurtTimer = Math.max(0, z.hurtTimer - dt);
    z.slowTimer = Math.max(0, z.slowTimer - dt);

    // 死亡
    if (z.hp <= 0) {
      score += def.points;
      document.getElementById('score-val').textContent = score;
      addParticles(z.x, (z.row + 0.5) * cellH, '#6b7280', 8);
      zombies.splice(i, 1);
      continue;
    }

    // 检查是否在啃植物
    const zCol = Math.floor(z.x / cellW);
    const targetPlant = getPlantAt(z.row, zCol);
    if (targetPlant && z.x <= (targetPlant.col + 0.8) * cellW) {
      z.eating = true;
      z.eatTimer += dt;
      if (z.eatTimer > 500) {
        z.eatTimer = 0;
        targetPlant.hp -= def.dmg;
        targetPlant.hurtTimer = 200;
      }
    } else {
      z.eating = false;
      z.eatTimer = 0;
      const spd = z.slowTimer > 0 ? z.speed * 0.4 : z.speed;
      z.x -= spd * (dt / 16);
    }

    // 到达最左侧 = 游戏结束
    if (z.x < cellW * 0.2) {
      doGameOver();
      return;
    }
  }

  // 更新阳光
  for (let i = suns.length - 1; i >= 0; i--) {
    const s = suns[i];
    s.life -= dt;
    if (s.life <= 0) { suns.splice(i, 1); continue; }
    if (!s.settled) {
      s.y += s.vy;
      if (s.y >= s.targetY) { s.settled = true; }
    }
  }

  // 更新粒子
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05;
  }
}

// ==================== UI ====================
function updateSunDisplay() {
  document.getElementById('sun-val').textContent = sun;
  updatePlantCards();
}

function updatePlantCards() {
  const cards = document.querySelectorAll('.plant-card');
  const now = Date.now();
  cards.forEach(card => {
    const type = card.dataset.type;
    if (type === 'shovel') return;
    const cost = parseInt(card.dataset.cost);
    const ready = !cooldowns[type] || now >= cooldowns[type];
    card.classList.toggle('disabled', sun < cost || !ready);
    card.classList.toggle('on-cooldown', !ready);
  });
}

function selectPlant(type) {
  if (selectedPlant === type) {
    selectedPlant = null;
  } else {
    selectedPlant = type;
  }
  document.querySelectorAll('.plant-card').forEach(c => {
    c.classList.toggle('selected', c.dataset.type === selectedPlant);
  });
}

// ==================== 事件 ====================
document.querySelectorAll('.plant-card').forEach(card => {
  card.addEventListener('click', (e) => {
    e.preventDefault();
    const type = card.dataset.type;
    if (type === 'shovel') {
      selectPlant('shovel');
      return;
    }
    const cost = parseInt(card.dataset.cost);
    const now = Date.now();
    const ready = !cooldowns[type] || now >= cooldowns[type];
    if (sun >= cost && ready) {
      selectPlant(type);
    }
  });
});

canvas.addEventListener('click', (e) => {
  if (!playing || gameOver) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const col = Math.floor(x / cellW);
  const row = Math.floor(y / cellH);

  if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return;

  // 收集阳光（点击位置附近的阳光）
  for (const s of suns) {
    if (s.settled && Math.abs(s.x - x) < cellW * 0.6 && Math.abs(s.y - y) < cellH * 0.6) {
      collectSun(s);
      return;
    }
  }

  if (selectedPlant === 'shovel') {
    removePlant(row, col);
    selectedPlant = null;
    document.querySelectorAll('.plant-card').forEach(c => c.classList.remove('selected'));
    return;
  }

  if (selectedPlant) {
    placePlant(row, col);
  }
});

// 触摸支持
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const x = t.clientX - rect.left;
  const y = t.clientY - rect.top;

  // 阳光
  for (const s of suns) {
    if (s.settled && Math.abs(s.x - x) < cellW * 0.7 && Math.abs(s.y - y) < cellH * 0.7) {
      collectSun(s);
      return;
    }
  }

  const col = Math.floor(x / cellW);
  const row = Math.floor(y / cellH);
  if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return;

  if (selectedPlant === 'shovel') {
    removePlant(row, col);
    selectedPlant = null;
    document.querySelectorAll('.plant-card').forEach(c => c.classList.remove('selected'));
    return;
  }

  if (selectedPlant) {
    placePlant(row, col);
  }
}, { passive: false });

// ==================== 游戏状态 ====================
function startGame() {
  plants = []; bullets = []; zombies = []; suns = []; particles = [];
  cooldowns = {};
  sun = 50; score = 0; wave = 0;
  playing = true; gameOver = false;
  naturalSunTimer = 0; sunTimer = 0;
  selectedPlant = null;
  updateSunDisplay();
  document.getElementById('wave-val').textContent = '1';
  document.getElementById('score-val').textContent = '0';
  document.getElementById('overlay').classList.add('hidden');
  document.querySelectorAll('.plant-card').forEach(c => c.classList.remove('selected'));
  lastTime = performance.now();
  initWave(0);
}

function doGameOver() {
  gameOver = true;
  playing = false;
  const ov = document.getElementById('overlay');
  ov.querySelector('h1').textContent = '游戏结束';
  ov.querySelector('.sub').innerHTML = `坚持了 ${wave + 1} 波 · 得分 ${score}`;
  const fs = document.createElement('div');
  // 复用 overlay
  document.getElementById('start-btn').textContent = '再来一局';
  ov.classList.remove('hidden');
}

document.getElementById('start-btn').addEventListener('click', (e) => {
  e.preventDefault();
  startGame();
});

// ==================== 主循环 ====================
let gameLoopTimer = null;

function gameLoop(now) {
  requestAnimationFrame(gameLoop);
  const dt = Math.min(now - lastTime, 50); // cap at 50ms
  lastTime = now;
  if (playing && !gameOver) {
    update(dt);
    updatePlantCards();
  }
  draw();
}

// 保底 setInterval（防止 rAF 被手机浏览器节流）
function startBackupTimer() {
  if (gameLoopTimer) clearInterval(gameLoopTimer);
  gameLoopTimer = setInterval(() => {
    if (!playing || gameOver) return;
    const now = performance.now();
    const dt = Math.min(now - lastTime, 50);
    lastTime = now;
    update(dt);
    draw();
  }, 100);
}

// ==================== 启动 ====================
resize();
requestAnimationFrame(gameLoop);
startBackupTimer();
</script>
